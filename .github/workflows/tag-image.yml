name: Tag Image

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Prepare image metadata
        id: image
        shell: bash
        run: |
          image="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "Building ${image}:${GITHUB_REF_NAME}"

      - name: Verify package publish token
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "${GHCR_TOKEN}" ]; then
            echo "::error::GITHUB_TOKEN is unavailable; cannot authenticate to GHCR."
            exit 1
          fi
          echo "GHCR token is present; packages:write permission is declared for this job."

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Write image summary
        run: |
          {
            echo "### Published image"
            echo "- \`${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}\`"
            echo "- \`${{ steps.image.outputs.name }}:latest\`"
          } >> "$GITHUB_STEP_SUMMARY"
