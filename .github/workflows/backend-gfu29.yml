name: Backend GFU-29 Gate

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - "ops-deploy.sh"
      - "pnpm-lock.yaml"
      - ".github/workflows/backend-gfu29.yml"
  workflow_dispatch:

jobs:
  backend-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      GFU29_POSTGRES_ADMIN_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test backend contracts and PostgreSQL integrations
        run: pnpm --filter @homelab/backend test

      - name: Lint backend
        run: pnpm --filter @homelab/backend lint

      - name: Build backend
        run: pnpm --filter @homelab/backend build
