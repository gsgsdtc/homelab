name: Post Commit Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: Full 40-character commit SHA on main to deploy. Defaults to the workflow SHA.
        required: false
        type: string

concurrency:
  group: homelab-post-commit-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Stage 2 Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      deploy_status: ${{ steps.deploy_result.outputs.deploy_status }}
      portal_url: ${{ steps.deploy_result.outputs.portal_url }}
      admin_url: ${{ steps.deploy_result.outputs.admin_url }}
      backend_url: ${{ steps.deploy_result.outputs.backend_url }}
      result_artifact: homelab-deploy-result
    env:
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.sha }}
      DEPLOY_RESULT_FILE: deploy-result/deploy-result.json
      DEPLOY_LOG_FILE: deploy-result/deploy.log
      REMOTE_DEPLOY_RESULT_FILE: /home/gsg/workspace/project/homelab/deploy/deploy-result.json
      REMOTE_DEPLOY_LOG_FILE: /home/gsg/workspace/project/homelab/deploy/deploy.log
      DEPLOY_SSH_HOST: ${{ vars.HOMELAB_DEPLOY_SSH_HOST || 'home.gfun.vip' }}
      DEPLOY_SSH_USER: ${{ vars.HOMELAB_DEPLOY_SSH_USER || 'gsg' }}
      DEPLOY_SSH_PORT: ${{ vars.HOMELAB_DEPLOY_SSH_PORT || '22' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare local artifact paths
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${DEPLOY_RESULT_FILE}")"
          rm -f "${DEPLOY_RESULT_FILE}" "${DEPLOY_LOG_FILE}"

      - name: Validate deploy ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "::error::Only pushes to main may trigger automatic deployment."
            exit 1
          fi
          if [[ ! "${DEPLOY_REF}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::DEPLOY_REF must be a full 40-character commit SHA."
            exit 1
          fi
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${DEPLOY_REF}" origin/main; then
            echo "::error::Ref ${DEPLOY_REF} is not reachable from origin/main."
            exit 1
          fi
          echo "Deploying ${DEPLOY_REF}"

      - name: Prepare SSH access
        shell: bash
        env:
          HOMELAB_DEPLOY_SSH_KEY: ${{ secrets.HOMELAB_DEPLOY_SSH_KEY }}
          HOMELAB_DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.HOMELAB_DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SSH_HOST}" ] || [ -z "${DEPLOY_SSH_USER}" ] || [ -z "${DEPLOY_SSH_PORT}" ]; then
            echo "::error::HOMELAB_DEPLOY_SSH_HOST, HOMELAB_DEPLOY_SSH_USER, and HOMELAB_DEPLOY_SSH_PORT must resolve to non-empty values."
            exit 1
          fi
          if [ -z "${HOMELAB_DEPLOY_SSH_KEY:-}" ]; then
            echo "::error::HOMELAB_DEPLOY_SSH_KEY secret is not configured."
            exit 1
          fi

          install -m 700 -d "${HOME}/.ssh"
          printf "%s\n" "${HOMELAB_DEPLOY_SSH_KEY}" > "${HOME}/.ssh/homelab_deploy_key"
          chmod 600 "${HOME}/.ssh/homelab_deploy_key"

          if [ -n "${HOMELAB_DEPLOY_SSH_KNOWN_HOSTS:-}" ]; then
            printf "%s\n" "${HOMELAB_DEPLOY_SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          else
            ssh-keyscan -p "${DEPLOY_SSH_PORT}" "${DEPLOY_SSH_HOST}" > "${HOME}/.ssh/known_hosts"
          fi
          chmod 600 "${HOME}/.ssh/known_hosts"

      - name: Run Stage 2 deploy entry
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${DEPLOY_LOG_FILE}")"

          ssh_target="${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          ssh_opts=(
            -i "${HOME}/.ssh/homelab_deploy_key"
            -p "${DEPLOY_SSH_PORT}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )
          scp_opts=(
            -i "${HOME}/.ssh/homelab_deploy_key"
            -P "${DEPLOY_SSH_PORT}"
            -o IdentitiesOnly=yes
            -o StrictHostKeyChecking=yes
          )

          cat > remote-deploy.sh <<'REMOTE_DEPLOY'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          : "${DEPLOY_REF:?DEPLOY_REF is required}"
          : "${HOMELAB_DEPLOY_RESULT_FILE:?HOMELAB_DEPLOY_RESULT_FILE is required}"
          : "${HOMELAB_DEPLOY_LOG_FILE:?HOMELAB_DEPLOY_LOG_FILE is required}"

          PROJECT_ROOT="${HOMELAB_PROJECT_ROOT:-/home/gsg/workspace/project/homelab}"
          SOURCE_DIR="${HOMELAB_SOURCE_DIR:-${PROJECT_ROOT}/source}"
          RUNTIME_DIR="${HOMELAB_RUNTIME_DIR:-${PROJECT_ROOT}/deploy}"
          REPO_URL="${HOMELAB_REPO_URL:-git@github.com:gsgsdtc/homelab.git}"

          mkdir -p "${PROJECT_ROOT}" "${RUNTIME_DIR}" "$(dirname "${HOMELAB_DEPLOY_RESULT_FILE}")" "$(dirname "${HOMELAB_DEPLOY_LOG_FILE}")"
          rm -f "${HOMELAB_DEPLOY_RESULT_FILE}" "${HOMELAB_DEPLOY_LOG_FILE}"

          if [ ! -d "${SOURCE_DIR}/.git" ]; then
            git clone "${REPO_URL}" "${SOURCE_DIR}"
          fi

          git -C "${SOURCE_DIR}" fetch --prune origin main
          git -C "${SOURCE_DIR}" checkout --detach "${DEPLOY_REF}"

          cd "${SOURCE_DIR}"
          set -o pipefail
          HOMELAB_GIT_REF="${DEPLOY_REF}" ./ops-deploy.sh --skip-git 2>&1 | tee "${HOMELAB_DEPLOY_LOG_FILE}"
          REMOTE_DEPLOY

          scp "${scp_opts[@]}" remote-deploy.sh "${ssh_target}:/tmp/homelab-remote-deploy.sh"

          printf -v remote_cmd \
            'DEPLOY_REF=%q HOMELAB_DEPLOY_RESULT_FILE=%q HOMELAB_DEPLOY_LOG_FILE=%q HOMELAB_DEPLOY_TRIGGER=%q HOMELAB_DEPLOY_TRIGGER_REF=%q HOMELAB_DEPLOY_TRIGGER_SHA=%q HOMELAB_DEPLOY_TRIGGER_RUN_URL=%q bash /tmp/homelab-remote-deploy.sh' \
            "${DEPLOY_REF}" \
            "${REMOTE_DEPLOY_RESULT_FILE}" \
            "${REMOTE_DEPLOY_LOG_FILE}" \
            "github-actions" \
            "${{ github.ref }}" \
            "${{ github.sha }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          set +e
          ssh "${ssh_opts[@]}" "${ssh_target}" "${remote_cmd}"
          deploy_rc=$?
          scp "${scp_opts[@]}" "${ssh_target}:${REMOTE_DEPLOY_RESULT_FILE}" "${DEPLOY_RESULT_FILE}"
          result_copy_rc=$?
          scp "${scp_opts[@]}" "${ssh_target}:${REMOTE_DEPLOY_LOG_FILE}" "${DEPLOY_LOG_FILE}" || true
          set -e

          if [ "${result_copy_rc}" -ne 0 ]; then
            echo "::error::Failed to copy remote deploy result from ${REMOTE_DEPLOY_RESULT_FILE}."
            exit "${result_copy_rc}"
          fi
          exit "${deploy_rc}"

      - name: Read deploy result
        id: deploy_result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -s "${DEPLOY_RESULT_FILE}" ]; then
            echo "deploy_status=missing" >> "${GITHUB_OUTPUT}"
            echo "::error::Deploy result file is missing: ${DEPLOY_RESULT_FILE}"
            exit 1
          fi
          status="$(sed -n 's/^[[:space:]]*"status": "\([^"]*\)".*/\1/p' "${DEPLOY_RESULT_FILE}" | head -n 1)"
          portal_url="$(sed -n 's/^[[:space:]]*"portal": "\([^"]*\)".*/\1/p' "${DEPLOY_RESULT_FILE}" | head -n 1)"
          admin_url="$(sed -n 's/^[[:space:]]*"admin": "\([^"]*\)".*/\1/p' "${DEPLOY_RESULT_FILE}" | head -n 1)"
          backend_url="$(sed -n 's/^[[:space:]]*"backend": "\([^"]*\)".*/\1/p' "${DEPLOY_RESULT_FILE}" | head -n 1)"
          {
            echo "deploy_status=${status}"
            echo "portal_url=${portal_url}"
            echo "admin_url=${admin_url}"
            echo "backend_url=${backend_url}"
          } >> "${GITHUB_OUTPUT}"
          {
            echo "### Homelab deploy result"
            echo "- Status: ${status}"
            echo "- Portal: ${portal_url:-n/a}"
            echo "- Admin: ${admin_url:-n/a}"
            echo "- Backend: ${backend_url:-n/a}"
            echo "- Result file: ${DEPLOY_RESULT_FILE}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: homelab-deploy-result
          path: |
            ${{ env.DEPLOY_RESULT_FILE }}
            ${{ env.DEPLOY_LOG_FILE }}
          if-no-files-found: warn

  qa-e2e:
    name: QA E2E Handoff
    needs: deploy
    if: ${{ needs.deploy.result == 'success' && needs.deploy.outputs.deploy_status == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: homelab-deploy-result
          path: deploy-result

      - name: Verify QA-readable deploy result
        shell: bash
        run: |
          set -euo pipefail
          result_file="$(find deploy-result -name deploy-result.json -print -quit)"
          if [ -z "${result_file}" ]; then
            echo "::error::deploy-result.json was not present in the deploy artifact."
            exit 1
          fi
          grep -q '"status": "success"' "${result_file}"
          {
            echo "### QA E2E input"
            echo "- Deploy artifact: homelab-deploy-result"
            echo "- Portal: ${{ needs.deploy.outputs.portal_url }}"
            echo "- Admin: ${{ needs.deploy.outputs.admin_url }}"
            echo "- Backend: ${{ needs.deploy.outputs.backend_url }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Trigger Multica QA E2E on GFU-13
        # Posts a comment to GFU-13 that @mentions the QA agent and passes
        # only the deploy-result fields agreed in the Stage 4 contract:
        # commit_sha, git_ref, trigger.run_url, and the four public URLs.
        # Required repository secrets/vars:
        #   secrets.MULTICA_QA_PAT        a workspace PAT (mul_*) that can comment on issues
        #   vars.MULTICA_SERVER_URL       e.g. https://home.gfun.vip:8320
        #   vars.MULTICA_WORKSPACE_ID     workspace UUID
        #   vars.MULTICA_QA_ISSUE_ID      GFU-13 issue UUID
        #   vars.MULTICA_QA_AGENT_ID      QA agent UUID
        env:
          MULTICA_SERVER_URL: ${{ vars.MULTICA_SERVER_URL }}
          MULTICA_PAT: ${{ secrets.MULTICA_QA_PAT }}
          MULTICA_WORKSPACE_ID: ${{ vars.MULTICA_WORKSPACE_ID }}
          MULTICA_QA_ISSUE_ID: ${{ vars.MULTICA_QA_ISSUE_ID }}
          MULTICA_QA_AGENT_ID: ${{ vars.MULTICA_QA_AGENT_ID }}
          DEPLOY_RESULT_FILE: deploy-result/deploy-result.json
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${MULTICA_PAT:-}" ]; then
            echo "::error::MULTICA_QA_PAT secret is not configured. The QA trigger bridge cannot run without a workspace PAT."
            exit 1
          fi

          commit_sha="$(jq -r '.commit_sha // empty' "${DEPLOY_RESULT_FILE}")"
          git_ref="$(jq -r '.git_ref // empty' "${DEPLOY_RESULT_FILE}")"
          run_url="$(jq -r '.trigger.run_url // empty' "${DEPLOY_RESULT_FILE}")"
          portal_url="$(jq -r '.urls.portal // empty' "${DEPLOY_RESULT_FILE}")"
          admin_url="$(jq -r '.urls.admin // empty' "${DEPLOY_RESULT_FILE}")"
          backend_url="$(jq -r '.urls.backend // empty' "${DEPLOY_RESULT_FILE}")"
          rewrite_url="$(jq -r '.urls.rewrite // empty' "${DEPLOY_RESULT_FILE}")"

          missing=()
          [ -n "${commit_sha}" ] || missing+=("commit_sha")
          [ -n "${git_ref}" ] || missing+=("git_ref")
          [ -n "${run_url}" ] || missing+=("trigger.run_url")
          [ -n "${portal_url}" ] || missing+=("urls.portal")
          [ -n "${admin_url}" ] || missing+=("urls.admin")
          [ -n "${backend_url}" ] || missing+=("urls.backend")
          [ -n "${rewrite_url}" ] || missing+=("urls.rewrite")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Deploy result is missing required QA input fields: ${missing[*]}"
            exit 1
          fi

          cat > qa-trigger-comment.md <<EOF
          Stage 2 部署成功，触发 Stage 4 QA E2E。

          输入全部来自本次 deploy artifact，禁止读取目标机本地文件或使用 localhost。

          - commit_sha: ${commit_sha}
          - git_ref: ${git_ref}
          - trigger.run_url: ${run_url}
          - urls.portal: ${portal_url}
          - urls.admin: ${admin_url}
          - urls.backend: ${backend_url}
          - urls.rewrite: ${rewrite_url}

          请 [@qa](mention://agent/${MULTICA_QA_AGENT_ID}) 执行以下最小检查并将结果回写到本 issue：
          1. portal 返回 200
          2. admin login 返回 200
          3. backend health 返回 status=ok
          4. admin rewrite health 返回 status=ok
          5. 如测试账号契约存在，补充 admin 登录及关键页面 E2E

          通过时回写：status=passed、commit_sha、四个 URL、执行时间、用例摘要。
          失败时回写：status=failed、失败场景、复现步骤、实际结果、期望结果、归属判断（devops/backend/frontend）。
          URL 不可访问时按环境/网络、部署编排/产物、部署或服务问题分类。
          EOF

          jq -n --arg content "$(cat qa-trigger-comment.md)" '{content: $content}' > qa-payload.json

          http_status="$(curl -s -o qa-response.json -w "%{http_code}" \
            --fail-with-body \
            -X POST \
            -H "Authorization: Bearer ${MULTICA_PAT}" \
            -H "Content-Type: application/json" \
            -H "X-Workspace-ID: ${MULTICA_WORKSPACE_ID}" \
            "${MULTICA_SERVER_URL}/api/issues/${MULTICA_QA_ISSUE_ID}/comments" \
            -d @qa-payload.json)"

          if [ "${http_status}" -ne 200 ] && [ "${http_status}" -ne 201 ]; then
            echo "::error::Failed to post QA trigger comment. HTTP ${http_status}"
            cat qa-response.json >&2 || true
            exit 1
          fi

          {
            echo "### Multica QA trigger"
            echo "- Issue: ${MULTICA_QA_ISSUE_ID}"
            echo "- commit_sha: ${commit_sha}"
            echo "- portal: ${portal_url}"
            echo "- admin: ${admin_url}"
            echo "- backend: ${backend_url}"
            echo "- rewrite: ${rewrite_url}"
          } >> "${GITHUB_STEP_SUMMARY}"
          echo "QA trigger comment posted successfully."
